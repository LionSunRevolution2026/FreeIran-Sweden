<!doctype html>
<html lang="fa" dir="rtl">
<head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GN46JLLP0X"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-GN46JLLP0X');
</script>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sweden Email Campaign</title>

<meta property="og:title" content="Sweden email campaign">
<meta property="og:description" content="Send email to members of the Swedish Parliament">
<meta property="og:type" content="website">
<meta property="og:url" content="https://LionSunRevolution2026.github.io/FreeIran-Sweden/">

<style>
:root{
--bg0:#07131c; --bg1:#071a26; --bg2:#061018;
--card0:#0e2533; --card1:#0b1f2c;
--border:rgba(255,255,255,.10);
--text:#e8f2ff;
--muted:rgba(232,242,255,.78);
--accent:#6fcf97;
--info0:rgba(111,207,151,.10);
--info1:rgba(111,207,151,.25);
--inputBg:rgba(255,255,255,.06);
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
max-width:980px;
margin:34px auto;
padding:0 16px 30px;
line-height:1.6;
color:var(--text);
background:
radial-gradient(1200px 700px at 20% 10%, rgba(47,192,214,.10), transparent 55%),
radial-gradient(900px 600px at 80% 0%, rgba(60,120,255,.10), transparent 50%),
linear-gradient(180deg,var(--bg1),var(--bg0) 55%,var(--bg2));
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.titleRow{
display:flex;
align-items:center;
gap:12px;
}

.badgeIcon{
width:55px;
height:55px;
font-size:35px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.06);
border:1px solid var(--border);
}

h1{margin:0;font-size:32px}
.subtitle{color:var(--muted);white-space:pre-line}

button{
padding:10px 12px;
border-radius:12px;
background:rgba(255,255,255,.06);
border:1px solid var(--border);
color:#fff;
font-weight:700;
cursor:pointer;
}

.card{
background:linear-gradient(180deg,var(--card0),var(--card1));
border:1px solid var(--border);
border-radius:20px;
padding:16px;
margin:14px 0;
}

pre{
white-space:pre-wrap;
background:rgba(0,0,0,.18);
border:1px solid rgba(255,255,255,.1);
border-radius:12px;
padding:14px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,.14);
background:var(--inputBg);
color:var(--text);
}

.sendBtn{
width:100%;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.16);
font-weight:700;
}
</style>
</head>

<body>

<div class="topbar">
<div class="titleRow">
<div class="badgeIcon">🕊️</div>
<div>
<h1 id="pageTitle"></h1>
<div class="subtitle" id="pageSubtitle"></div>
</div>
</div>
<button id="langBtn"></button>
</div>

<div class="card">
<h2 id="aboutTitle"></h2>
<pre id="aboutText"></pre>
</div>

<div class="card">
<h2 id="signatureTitle"></h2>
<p id="signatureNote"></p>

<label id="nameLabel"></label>
<input id="fullName" type="text">
<p id="nameHint"></p>
</div>

<div class="card">
<button class="sendBtn" id="sendBtn"></button>

<p><b id="previewSubjectLabel"></b> <span id="previewSubject"></span></p>
<pre id="previewBody"></pre>
</div>

<script>

let LANG="fa";

const SUBJECT={
fa:"حمایت از دموکراسی در ایران و نقش رضا پهلوی در یک گذار مسالمت‌آمیز",
en:"Support for Democracy in Iran and Reza Pahlavi’s Role in a Peaceful Transition",
sv:"Stöd för demokrati i Iran och Reza Pahlavis roll i en fredlig övergång"
};

const UI={

fa:{
dir:"rtl",
title:"کمپین ایمیل سوئد",
subtitle:"با یک کلیک پیش‌نویس ایمیل آماده می‌شود.",
aboutTitle:"ترجمه متن ایمیل",
signatureTitle:"امضای شما",
signatureNote:"نام خود را در صورت تمایل وارد کنید.",
nameLabel:"نام کامل",
nameHint:"اختیاری",
toggle:"🌐 EN",
sendBtn:"ارسال ایمیل",
subjectLabel:"موضوع:"
},

en:{
dir:"ltr",
title:"Sweden email campaign",
subtitle:"One click opens a ready email draft.",
aboutTitle:"Email message",
signatureTitle:"Your signature",
signatureNote:"Enter your name if you wish.",
nameLabel:"Full name",
nameHint:"Optional",
toggle:"🌐 SV",
sendBtn:"Send email",
subjectLabel:"Subject:"
},

sv:{
dir:"ltr",
title:"Sverige e-postkampanj",
subtitle:"Ett klick öppnar ett färdigt e-postutkast.",
aboutTitle:"E-posttext",
signatureTitle:"Din signatur",
signatureNote:"Du kan skriva ditt namn om du vill.",
nameLabel:"Fullständigt namn",
nameHint:"Valfritt",
toggle:"🌐 FA",
sendBtn:"Skicka e-post",
subjectLabel:"Ämne:"
}

};

function setLang(lang){

LANG=lang;
const t=UI[lang];

document.documentElement.lang=lang;
document.documentElement.dir=t.dir;

document.getElementById("pageTitle").textContent=t.title;
document.getElementById("pageSubtitle").textContent=t.subtitle;

document.getElementById("aboutTitle").textContent=t.aboutTitle;
document.getElementById("signatureTitle").textContent=t.signatureTitle;
document.getElementById("signatureNote").textContent=t.signatureNote;

document.getElementById("nameLabel").textContent=t.nameLabel;
document.getElementById("nameHint").textContent=t.nameHint;

document.getElementById("langBtn").textContent=t.toggle;

document.getElementById("sendBtn").textContent=t.sendBtn;

document.getElementById("previewSubjectLabel").textContent=t.subjectLabel;
document.getElementById("previewSubject").textContent=SUBJECT[lang];

}

document.getElementById("langBtn").onclick=()=>{

if(LANG==="fa") setLang("en");
else if(LANG==="en") setLang("sv");
else setLang("fa");

};

setLang("fa");

</script>

</body>
</html>
