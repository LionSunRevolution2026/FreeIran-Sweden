  <style>
    :root{
      --bg0:#07131c; --bg1:#071a26; --bg2:#061018;
      --card0:#0e2533; --card1:#0b1f2c;
      --border:rgba(255,255,255,.10);
      --text:#e8f2ff;
      --muted:rgba(232,242,255,.78);
      --accent:#6fcf97;
      --info0:rgba(111,207,151,.10);
      --info1:rgba(111,207,151,.25);
      --inputBg:rgba(255,255,255,.06);
    }

    *{box-sizing:border-box}

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      max-width:980px;
      margin:34px auto;
      padding:0 16px 30px;
      line-height:1.6;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(47,192,214,.10), transparent 55%),
        radial-gradient(900px 600px at 80% 0%, rgba(60,120,255,.10), transparent 50%),
        linear-gradient(180deg, var(--bg1), var(--bg0) 55%, var(--bg2));
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .titleRow{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .badgeIcon{
      width:55px;
      height:55px;
      font-size:35px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }

    h1{margin:0;font-size:32px;letter-spacing:.2px}
    .subtitle{margin:4px 0 0;color:var(--muted);white-space:pre-line}

    button, a.btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      transition:transform .05s ease, background .2s ease;
      user-select:none;
    }

    button:active{transform:translateY(1px)}
    button:disabled{opacity:.5;cursor:not-allowed}

    .langBtn{
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)),
        linear-gradient(180deg, var(--card0), var(--card1));
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      margin:14px 0;
      box-shadow:
        0 22px 60px rgba(0,0,0,.55),
        0 1px 0 rgba(255,255,255,.05) inset;
    }

    .emailTextCard pre{
      margin:10px 0 0;
      white-space:pre-wrap;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;
      padding:14px;
      color:rgba(232,242,255,.94);
      font-family:inherit;
      line-height:1.7;
    }

    .signatureCard{
      background:var(--info0);
      border:1px solid var(--info1);
    }

    .signatureTitle{
      margin:0 0 8px;
      font-size:20px;
    }

    .signatureText{
      color:var(--muted);
      margin:0 0 12px;
      white-space:pre-line;
    }

    .inputWrap{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .label{
      font-weight:700;
    }

    .nameInput{
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:var(--inputBg);
      color:var(--text);
      font-size:16px;
      outline:none;
    }

    .nameInput::placeholder{
      color:rgba(232,242,255,.45);
    }

    .inputHint{
      color:var(--muted);
      font-size:.95rem;
      margin:0;
    }

    .panel{
      border-radius:22px;
      padding:16px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      position:relative;
      overflow:hidden;
      box-shadow:0 18px 44px rgba(0,0,0,.42);
      margin-top:14px;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:-2px;
      opacity:.22;
      background: radial-gradient(900px 320px at 0% 0%, var(--accent), transparent 55%);
      pointer-events:none;
    }

    .panelHeader{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      position:relative;
    }

    .panelTitle{margin:0;font-size:22px;line-height:1.25}

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.15);
      font-weight:900;
      white-space:nowrap;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:var(--accent);
      box-shadow:0 0 0 3px rgba(255,255,255,.06);
    }

    .meta{
      margin:10px 0 12px;
      color:#fff;
      position:relative;
      font-weight:900;
      line-height:1.7;
    }

    .sendBox{
      position:relative;
      border-radius:18px;
      padding:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.16);
    }

    .sendBtn{
      width:100%;
      padding:14px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      font-size:16px;
    }

    .statusLine{margin-top:10px;color:var(--muted)}
    .bullets{margin:10px 0 0 18px;color:var(--muted)}
    .bullets li{margin:6px 0}

    details{margin-top:10px}
    details summary{cursor:pointer;font-weight:900}

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      unicode-bidi:plaintext;
      word-break:break-word;
    }

    pre.mono{
      white-space:pre-wrap;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;
      padding:12px;
      margin:10px 0 0;
      color:rgba(232,242,255,.92);
    }

    .files{margin-top:10px;color:var(--muted);font-size:.95rem}
    .error{color:#ffb4b4}

    @media (max-width:700px){
      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }
    }
  </style>
</head>

  <div class="topbar">
    <div class="titleRow">
      <div class="badgeIcon">🕊️</div>
      <div>
        <h1 id="pageTitle"></h1>

  <div class="card signatureCard">

      <div class="pill"><span class="dot"></span><span id="pillLabel"></span></div>
    </div>

    <div class="sendBox">
      <button class="sendBtn" id="sendBtn" disabled></button>

      <div class="statusLine">
        <span id="statusLabel"></span>
        <span id="status">—</span>
        <span id="error" class="error"></span>
      </div>

      <ul class="bullets" id="bullets"></ul>

      <details>
        <summary id="previewSummary"></summary>
        <div class="statusLine"><b id="previewSubjectLabel"></b> <span class="mono" id="previewSubject"></span></div>
        <pre class="mono" id="previewBody"></pre>
      </details>

      <div class="files" id="files"></div>
    </div>
  </section>

  <div class="card emailTextCard">
    <h2 id="aboutTitle"></h2>
    <pre id="aboutText"></pre>
  </div>

      aboutText:`موضوع: حمایت از آزادی و دموکراسی در ایران و نقش رضا پهلوی در گذار دموکراتیک

      signatureNote:"لطفاً نام خود را برای امضا وارد کنید تا به ایمیل ارزش و اعتبار بیشتری بدهد.\nما هیچ‌یک از این اطلاعات را در هیچ جایی ذخیره نمی‌کنیم، بنابراین نام شما محفوظ می‌ماند.\nدر صورت تمایل می‌توانید متن ایمیل را کمی تغییر دهید تا کاملاً تکراری نباشد.\nاگر برای کشورهای دیگر هم به این پلتفرم نیاز دارید، به ما اطلاع دهید.",

      aboutTitle:"Translation of the email message",
      aboutText:`Subject: Support for freedom and democracy in Iran and the role of Reza Pahlavi in a democratic transition

Body:

Dear Members of the Swedish Parliament,
Dear Decision-Makers,

I am a person of Iranian origin living in Sweden. I am writing to you because the situation in Iran is very important to many of us.

The Iranian people are fighting for freedom, democracy, and fundamental human rights. Therefore, I hope that Sweden will continue to clearly support the Iranian people’s right to decide the future of their country and to strive for democratic change.

At the same time, it is important that Iran’s territorial integrity and national unity are respected and protected. Iran’s future political system must be based on the free will of the Iranian people and comply with international law.

For any future transition to be stable and to avoid chaos or a power vacuum, coordination and leadership are also needed. In this context, I would like to highlight Crown Prince Reza Pahlavi’s role in the work for a democratic transition. Many Iranians see him as a unifying figure who can contribute to stability during a transitional period and help unite different groups around a democratic Iran.

I would also ask you to continue drawing attention to and clearly condemning the abuses taking place in Iran. The Iranian authorities have on several occasions shut down the internet in order to silence protests and conceal human rights violations. This is unacceptable and should be met with clear international reactions.

It is also important that civilians are protected. Ordinary people should not have to pay the price for political conflicts. At the same time, the international community should clearly condemn the Islamic Revolutionary Guard Corps for using hospitals, schools, and civilian areas as cover for its military activities.

I hope that Sweden continues to apply political and diplomatic pressure on the Iranian authorities until the Iranian people can live in freedom and under a democratic system. I would also encourage you to consider stronger measures within Europe, for example closing the Iranian regime’s embassies until real changes take place and the human rights violations come to an end.

The Iranian people deserve freedom, democracy, and respect for their fundamental rights. I hope that Sweden continues to stand clearly on their side.

Respectfully,`,

      aboutText:`Ämne: Stöd för frihet och demokrati i Iran och Reza Pahlavis roll i en demokratisk övergång

Text:

Bästa ledamöter i Sveriges riksdag,

Samtidigt är det viktigt att Irans territoriella integritet och nationella enhet respekteras och skyddas. Irans framtida politiska system måste bygga på det iranska folkets fria vilja och följa internationell rätt.

För att en framtida övergång ska bli stabil och för att undvika kaos eller maktvakuum behövs också samordning och ledarskap. I detta sammanhang vill jag lyfta fram kronprins Reza Pahlavis roll i arbetet för en demokratisk övergång. Många iranier ser honom som en samlande person som kan bidra till stabilitet under en övergångsperiod och hjälpa till att ena olika grupper kring ett demokratiskt Iran.

Jag vill också be er att fortsätta uppmärksamma och tydligt fördöma de övergrepp som sker i Iran. De iranska myndigheterna har vid flera tillfällen stängt ner internet för att tysta protester och dölja brott mot mänskliga rättigheter. Detta är oacceptabelt och bör mötas av tydliga internationella reaktioner.

      toggle:"🌐 FA",
      panelMeta:(total,batch)=>`Viktig information: Totalt ${total} e-postadresser har laddats. Endast ${batch} mottagare väljs varje gång för att minska risken att meddelandet markeras som spam av e-postsystem. Om du upprepar detta tillräckligt många gånger kommer hela listan så småningom att täckas. Uppdatera eller stäng inte sidan medan du skickar, annars börjar ordningen på omgångarna om från början.`,

      panelTitle:"Skicka e-post till ledamöter i Sveriges riksdag",
      panelGroup:"Sveriges riksdag",
      sendBtn:"✅ Skicka e-post",
      statusLabel:"Status: ",
      loaded:(n)=>`Laddade: ${n} e-postadresser`,
      bullets:[
        "Ett e-postutkast med mottagare förbereds.",
        "Den första mottagaren hamnar i To och resten i Bcc.",
        "Om du anger ett namn läggs det till i slutet av e-postmeddelandet."
      ],
      previewSummary:"Visa ämne och text",
      subjectLabel:"Ämne:",
      files:"Filer: mail1.txt + message1.txt",
      dash:"—",
      errorPrefix:"Fel: "
    }
  };

  const PANEL = {
    mailFile:"mail1.txt",
    msgFile:"message1.txt",
    emails:[],
    shuffledEmails:[],
    batchSize:40,
    batchIndex:0,
    subject:"",
    body:"",
    loaded:false,
    error:""
  };

  function setLang(lang){
    LANG = lang;
    const t = UI[LANG];

    document.documentElement.lang = LANG;
    document.documentElement.dir = t.dir;
    document.title = t.title;

    document.getElementById("pageTitle").textContent = t.title;
    document.getElementById("pageSubtitle").textContent = t.subtitle;
    document.getElementById("aboutTitle").textContent = t.aboutTitle;
    document.getElementById("aboutText").textContent = t.aboutText;
    document.getElementById("signatureTitle").textContent = t.signatureTitle;
    document.getElementById("signatureNote").textContent = t.signatureNote;
    document.getElementById("nameLabel").textContent = t.nameLabel;
    document.getElementById("fullName").placeholder = t.namePlaceholder;
    document.getElementById("nameHint").textContent = t.nameHint;
    document.getElementById("langBtn").textContent = t.toggle;

    document.getElementById("panelTitle").textContent = t.panelTitle;
    document.getElementById("pillLabel").textContent = t.panelGroup;
    document.getElementById("panelMeta").textContent =
      typeof t.panelMeta === "function"
        ? t.panelMeta(PANEL.emails.length || 0, PANEL.batchSize)
        : t.panelMeta;
    document.getElementById("sendBtn").textContent = t.sendBtn;
    document.getElementById("statusLabel").textContent = t.statusLabel;
    document.getElementById("previewSummary").textContent = t.previewSummary;
    document.getElementById("previewSubjectLabel").textContent = t.subjectLabel;
    document.getElementById("files").textContent = t.files;

    renderPanel();
  }

  document.getElementById("langBtn").addEventListener("click", () => {
    const previousLang = LANG;
    const next = (LANG === "fa") ? "en" : (LANG === "en") ? "sv" : "fa";

    trackEvent("language_switch", {
      event_category: "engagement",
      event_label: "language button",
      from_language: previousLang,
      to_language: next,
      page_name: "sweden_campaign"
    });

    setLang(next);
  });

  document.getElementById("fullName").addEventListener("input", (e) => {
    if (!nameInputTracked && e.target.value.trim().length > 0) {
      nameInputTracked = true;
      trackEvent("name_input_started", {
        event_category: "engagement",
        event_label: "signature name input",
        language: LANG,
        page_name: "sweden_campaign"
      });
    }
    renderPanel();
  });

  function normalizeEmails(text){
    return text
      .split(/\r?\n/)
      .map(l => l.trim())
      .filter(Boolean)
      .filter(l => !l.startsWith("#"));
  }

  function parseMessage(text){
    const subjectLine = text.match(/^SUBJECT:\s*(.*)$/m);
    const bodySplit = text.split(/^\s*BODY:\s*$/m);

    const subject = subjectLine ? subjectLine[1].trim() : "";
    const body = (bodySplit.length > 1) ? bodySplit.slice(1).join("\n").trim() : "";
    return { subject, body };
  }

  function getSignedBody(body){
    const name = document.getElementById("fullName").value.trim();
    if(!name) return body || "";
    const safeBody = body || "";
    return `${safeBody}\n\n${name}`;
  }

  function buildMailto(emails, subject, body){
    const to = emails[0] || "";
    const bccList = emails.slice(1);

    const toEncoded = encodeURIComponent(to);
    const bccEncoded = encodeURIComponent(bccList.join(","));
    const s = encodeURIComponent(subject || "");
    const b = encodeURIComponent(body || "");

    let url = `mailto:${toEncoded}?subject=${s}&body=${b}`;

    if (bccList.length > 0) {
      url += `&bcc=${bccEncoded}`;
    }

    return url;
  }

  function shuffleArray(arr){
    const a = [...arr];
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function getNextBatchEmails(){
    if (!PANEL.shuffledEmails.length) return [];

    if (PANEL.batchIndex >= PANEL.shuffledEmails.length) {
      PANEL.shuffledEmails = shuffleArray(PANEL.emails);
      PANEL.batchIndex = 0;
    }

    const batch = PANEL.shuffledEmails.slice(PANEL.batchIndex, PANEL.batchIndex + PANEL.batchSize);
    PANEL.batchIndex += PANEL.batchSize;

    return batch;
  }

  function setPanelError(msg){
    PANEL.error = msg;
    const errEl = document.getElementById("error");
    errEl.textContent = msg ? (" — " + msg) : "";
  }

  function renderPanel(){
    const t = UI[LANG];
    const finalBody = getSignedBody(PANEL.body);

    document.getElementById("status").textContent = PANEL.loaded ? t.loaded(PANEL.emails.length || 0) : t.loaded(0);

    const ul = document.getElementById("bullets");
    ul.innerHTML = "";
    for(const line of t.bullets){
      const li = document.createElement("li");
      li.textContent = line;
      ul.appendChild(li);
    }

    document.getElementById("previewSubject").textContent = PANEL.subject || t.dash;
    document.getElementById("previewBody").textContent = finalBody || t.dash;

    const ready = PANEL.loaded && PANEL.emails.length > 0 && (PANEL.subject.length > 0 || PANEL.body.length > 0) && !PANEL.error;
    document.getElementById("sendBtn").disabled = !ready;
  }

  async function loadPanel(){
    setPanelError("");

    try{
      const [mailRes, msgRes] = await Promise.all([
        fetch(PANEL.mailFile, { cache:"no-store" }),
        fetch(PANEL.msgFile, { cache:"no-store" })
      ]);

      if(!mailRes.ok) throw new Error(`${PANEL.mailFile} not found`);
      if(!msgRes.ok) throw new Error(`${PANEL.msgFile} not found`);

      const [mailTxt, msgTxt] = await Promise.all([mailRes.text(), msgRes.text()]);

      PANEL.emails = normalizeEmails(mailTxt);
      PANEL.shuffledEmails = shuffleArray(PANEL.emails);
      PANEL.batchIndex = 0;

      const parsed = parseMessage(msgTxt);
      PANEL.subject = parsed.subject;
      PANEL.body = parsed.body;
      PANEL.loaded = true;

      trackEvent("page_ready", {
        event_category: "page_state",
        event_label: "sweden campaign loaded",
        language: LANG,
        recipient_count: PANEL.emails.length,
        has_subject: PANEL.subject ? 1 : 0,
        has_body: PANEL.body ? 1 : 0,
        batch_size: PANEL.batchSize,
        page_name: "sweden_campaign"
      });

      setLang(LANG);
      renderPanel();
    }catch(e){
      PANEL.loaded = false;
      PANEL.emails = [];
      PANEL.shuffledEmails = [];
      PANEL.batchIndex = 0;
      PANEL.subject = "";
      PANEL.body = "";
      setPanelError(UI[LANG].errorPrefix + e.message);

      trackEvent("page_load_error", {
        event_category: "page_state",
        event_label: "sweden campaign load error",
        language: LANG,
        error_message: String(e.message || "unknown error"),
        page_name: "sweden_campaign"
      });

      renderPanel();
    }
  }

  document.getElementById("sendBtn").addEventListener("click", () => {
    if(!PANEL.loaded || !PANEL.emails.length) return;

    const batchEmails = getNextBatchEmails();
    if(!batchEmails.length) return;

    const finalBody = getSignedBody(PANEL.body);
    const mailtoUrl = buildMailto(batchEmails, PANEL.subject, finalBody);

    let navigated = false;
    const openMailClient = () => {
      if (navigated) return;
      navigated = true;
      window.location.href = mailtoUrl;
    };

    trackEvent("send_email_click", {
      event_category: "email_campaign",
      event_label: "Sweden Parliament Send Button",
      language: LANG,
      recipient_count: batchEmails.length,
      total_recipient_pool: PANEL.emails.length,
      has_name: document.getElementById("fullName").value.trim() ? 1 : 0,
      batch_start_index: Math.max(PANEL.batchIndex - PANEL.batchSize, 0),
      batch_size: PANEL.batchSize,
      page_name: "sweden_campaign",
      value: 1,
      event_callback: openMailClient,
      event_timeout: 1200
    });

    setTimeout(openMailClient, 1300);
  });

  (async function init(){
    setLang("fa");
    await loadPanel();
    renderPanel();
  })();
</script>

</body>
</html>
